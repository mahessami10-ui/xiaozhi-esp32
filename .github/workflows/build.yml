name: Build bread-compact-wifi

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build bread-compact-wifi
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Firmware
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py bread-compact-wifi --name bread-compact-wifi

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: bread-compact-wifi
          path: |
            build/merged-binary.bin
            build/*.bin
          if-no-files-found: warn
